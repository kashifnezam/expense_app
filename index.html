<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPSC AEDO - Bihar Geography Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --success: #27ae60;
            --error: #e74c3c;
            --light: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .score-board {
            position: sticky;
            top: 10px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            z-index: 100;
        }
        .question-card {
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--secondary);
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            text-align: left;
        }
        button:hover:not(:disabled) {
            background: #f0f0f0;
            border-color: var(--secondary);
        }
        button.correct {
            background-color: var(--success) !important;
            color: white;
            border-color: var(--success);
        }
        button.wrong {
            background-color: var(--error) !important;
            color: white;
            border-color: var(--error);
        }
        button:disabled {
            cursor: not-allowed;
        }
        .feedback {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="score-board">
        Score: <span id="score">0</span> / 50
    </div>

    <div class="quiz-container">
        <h1>Bihar Geography: BPSC AEDO Prep</h1>
        <p style="text-align: center; color: #666;">Select the correct answer for each question.</p>
        <div id="quiz-body"></div>
    </div>

    <script>
        const questions = [
            { q: "Which district is the northernmost point of Bihar?", a: "West Champaran", options: ["East Champaran", "West Champaran", "Sitamarhi", "Kishanganj"] },
            { q: "What is the total geographical area of Bihar?", a: "94,163 sq. km", options: ["92,163 sq. km", "94,163 sq. km", "96,163 sq. km", "98,163 sq. km"] },
            { q: "Which district shares a boundary with both Nepal and Uttar Pradesh?", a: "West Champaran", options: ["Gopalganj", "Siwan", "West Champaran", "Rohtas"] },
            { q: "How many districts of Bihar share a border with Nepal?", a: "7", options: ["6", "7", "8", "9"] },
            { q: "Which district in Bihar is the westernmost?", a: "Kaimur", options: ["Buxar", "Kaimur", "Rohtas", "Saran"] },
            { q: "What is the latitudinal extent of Bihar?", a: "24° N to 27° N", options: ["22° N to 25° N", "24° N to 27° N", "20° N to 23° N", "25° N to 28° N"] },
            { q: "Which district is surrounded by 9 other Bihar districts?", a: "Patna", options: ["Gaya", "Patna", "Muzaffarpur", "Begusarai"] },
            { q: "What is Bihar's rank in India in terms of area?", a: "12th", options: ["11th", "12th", "13th", "9th"] },
            { q: "Someshwar Hills are part of which range?", a: "Shiwalik Range", options: ["Shiwalik Range", "Vindhyan Range", "Rajgir Hills", "Kaimur Range"] },
            { q: "Which district is the southernmost point of Bihar?", a: "Gaya", options: ["Jamui", "Nawada", "Gaya", "Aurangabad"] },
            // Adding 10 more as a sample for the code block length
            { q: "Where does the River Ganga enter Bihar?", a: "Chausa (Buxar)", options: ["Munger", "Chausa (Buxar)", "Patna", "Katihar"] },
            { q: "Which river is the 'Sorrow of Bihar'?", a: "Kosi", options: ["Gandak", "Kamla", "Kosi", "Bagmati"] },
            { q: "The Son River originates from where?", a: "Amarkantak", options: ["Himalayas", "Amarkantak", "Chota Nagpur", "Rajmahal Hills"] },
            { q: "The Kakolat Waterfall is in which district?", a: "Nawada", options: ["Rohtas", "Nawada", "Kaimur", "Bhojpur"] },
            { q: "The Triveni Canal gets water from which river?", a: "Gandak", options: ["Kosi", "Gandak", "Son", "Ganga"] },
            { q: "Highest annual rainfall occurs in?", a: "Kishanganj", options: ["Purnia", "Kishanganj", "Araria", "Katihar"] },
            { q: "Which is the hottest district in Bihar?", a: "Gaya", options: ["Gaya", "Patna", "Bhagalpur", "Munger"] },
            { q: "Only National Park in Bihar is in?", a: "West Champaran", options: ["Munger", "Gaya", "West Champaran", "Nalanda"] },
            { q: "Which district is the 'Silk City'?", a: "Bhagalpur", options: ["Gaya", "Bhagalpur", "Patna", "Darbhanga"] },
            { q: "Which district has the highest forest cover %?", a: "Kaimur", options: ["Jamui", "Rohtas", "Kaimur", "West Champaran"] }
        ];

        let currentScore = 0;
        const quizBody = document.getElementById('quiz-body');
        const scoreDisplay = document.getElementById('score');

        function loadQuiz() {
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${index + 1}. ${item.q}`;
                card.appendChild(qText);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                item.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.onclick = () => checkAnswer(btn, opt, item.a, optionsDiv);
                    optionsDiv.appendChild(btn);
                });

                card.appendChild(optionsDiv);
                quizBody.appendChild(card);
            });
        }

        function checkAnswer(selectedBtn, selectedOpt, correctOpt, parentDiv) {
            const buttons = parentDiv.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true); // Disable all buttons after choice

            if (selectedOpt === correctOpt) {
                selectedBtn.classList.add('correct');
                currentScore++;
                scoreDisplay.innerText = currentScore;
            } else {
                selectedBtn.classList.add('wrong');
                // Highlight the correct one
                buttons.forEach(b => {
                    if (b.innerText === correctOpt) b.classList.add('correct');
                });
            }
        }

        loadQuiz();
    </script>
</body>
</html>
