const container = document.getElementById('quiz-container');
let correct = 0, wrong = 0, total = 0;

quizData.forEach((section, sIdx) => {
    const sHeader = document.createElement('div');
    sHeader.className = 'topic-sec';
    sHeader.innerHTML = `<h3>${section.title}</h3><p style="font-size:0.9rem">${section.summary}</p>`;
    container.appendChild(sHeader);

    section.qs.forEach((q, qIdx) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <span class="year-tag">${q.y}</span>
            <div style="font-weight:600; margin-top:8px">${total+1}. ${q.q}</div>
            <div class="opts" id="opt-grp-${total}">
                ${q.o.map(opt => `<button onclick="check(this, '${opt}', '${q.a}', ${total})">${opt}</button>`).join('')}
            </div>
        `;
        container.appendChild(card);
        total++;
    });
});

function check(btn, sel, ans, id) {
    const grp = document.getElementById(`opt-grp-${id}`);
    const btns = grp.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);
    
    if(sel === ans) {
        btn.classList.add('correct');
        correct++;
        document.getElementById('c-count').innerText = correct;
    } else {
        btn.classList.add('wrong');
        wrong++;
        document.getElementById('w-count').innerText = wrong;
        btns.forEach(b => { if(b.innerText === ans) b.classList.add('correct'); });
    }
    
    const attempted = correct + wrong;
    document.getElementById('score-pct').innerText = Math.round((correct / attempted) * 100);
}
